name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  encyclopedia-visibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check encyclopedia visibility chain
        run: python tools/ci_encyclopedia_visibility_check.py
